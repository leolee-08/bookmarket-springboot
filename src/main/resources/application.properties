# ===================================
# H2 개발용 설정 (MySQL 없을 때 사용)
# ===================================
spring.datasource.url=jdbc:h2:mem:bookmarket_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================
# MySQL 설정 (MySQL 설치 후 위 H2 설정 주석처리하고 아래 주석 해제)
# ===================================
#spring.datasource.url=jdbc:mysql://localhost:3306/bookmarket_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.username=root
#spring.datasource.password=비밀번호입력

# ===================================
# JPA 설정
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# MySQL 사용 시: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================
# 서버 설정
# ===================================
server.port=8080
spring.application.name=bookmarket

# ===================================
# Thymeleaf 설정
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===================================
# OAuth2 로그인 설정
# 실제 운영/개발 환경에서는 아래 환경변수에 발급받은 값을 넣어 실행하세요.
# Google redirect URI: http://localhost:8080/login/oauth2/code/google
# Naver redirect URI: http://localhost:8080/login/oauth2/code/naver
# ===================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:naver-client-id}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:naver-client-secret}
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
