<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>북마켓 - 장바구니</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/books}">📚 북마켓</a></div>
    <ul class="nav-menu">
        <li><a th:href="@{/books}">상품</a></li>
        <li><a th:href="@{/cart}" class="active">🛒 장바구니</a></li>
        <li><a th:href="@{/order}">주문내역</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">관리자</a></li>
    </ul>
    <div class="nav-user">
        <span sec:authentication="name"></span>님
        <form th:action="@{/member/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit"
                    style="background:none; border:none; color:#aaa; cursor:pointer; font-size:inherit;">
                로그아웃
            </button>
        </form>
    </div>
</nav>

<div class="container">
    <h2>🛒 장바구니</h2>

    <div th:if="${cart.cartItems.isEmpty()}" class="empty-msg">
        장바구니가 비어있습니다. <a th:href="@{/books}">도서 보러가기</a>
    </div>

    <div th:if="${!cart.cartItems.isEmpty()}">
        <!-- 장바구니 목록 테이블 (기존 Swing CartItemListPage 테이블 구조 동일) -->
        <table class="book-table">
            <thead>
                <tr>
                    <th>도서ID</th>
                    <th>도서명</th>
                    <th>단가</th>
                    <th>수량</th>
                    <th>합계</th>
                    <th>삭제</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.cartItems}">
                    <td th:text="${item.book.isbn}"></td>
                    <td th:text="${item.book.title}"></td>
                    <td th:text="${#numbers.formatInteger(item.book.price, 0, 'COMMA') + '원'}"></td>
                    <td>
                        <!-- 수량 변경 (기존 CartItemListPage 수량 관련 기능 개선) -->
                        <form th:action="@{/cart/update/{id}(id=${item.cartItemId})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" name="quantity" th:value="${item.quantity - 1}">-</button>
                            <span th:text="${item.quantity}"></span>
                            <button type="submit" name="quantity" th:value="${item.quantity + 1}">+</button>
                        </form>
                    </td>
                    <td th:text="${#numbers.formatInteger(item.totalPrice, 0, 'COMMA') + '원'}"></td>
                    <td>
                        <form th:action="@{/cart/remove/{id}(id=${item.cartItemId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-danger">삭제</button>
                        </form>
                    </td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" style="text-align:right"><strong>총 금액:</strong></td>
                    <td colspan="2">
                        <strong th:text="${#numbers.formatInteger(cart.totalPrice, 0, 'COMMA') + '원'}"></strong>
                    </td>
                </tr>
            </tfoot>
        </table>

        <!-- 주문하기 (기존 CartShippingPage로 이동) -->
        <div class="cart-actions">
            <form th:action="@{/order/create}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label>배송지 주소</label>
                    <input type="text" name="deliveryAddress" placeholder="배송 주소 입력" required>
                </div>
                <button type="submit" class="btn-primary">주문하기</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
