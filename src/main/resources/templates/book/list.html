<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>북마켓 - 도서목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar('books')}"></div>

<div class="container">
    <h2>도서 목록</h2>

    <form th:action="@{/books}" method="get" class="search-form">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="도서명 검색">
        <button type="submit">검색</button>
    </form>

    <table class="book-table">
        <thead>
        <tr>
            <th>ISBN</th>
            <th>도서명</th>
            <th>가격</th>
            <th>저자</th>
            <th>카테고리</th>
            <th>출판일</th>
            <th>기능</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.isbn}"></td>
            <td>
                <a th:href="@{/books/{id}(id=${book.bookId})}"
                   th:text="${book.title}"></a>
            </td>
            <td th:text="${#numbers.formatInteger(book.price, 0, 'COMMA') + '원'}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.releaseDate}"></td>
            <td>
                <button class="btn-cart"
                        th:data-book-id="${book.bookId}"
                        th:data-csrf="${_csrf.token}"
                        th:data-csrf-header="${_csrf.headerName}"
                        onclick="addToCart(this)">
                    장바구니
                </button>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(books)}" class="empty-msg">
        검색 결과가 없습니다.
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    function addToCart(btn) {
        const bookId = $(btn).data('book-id');
        const token  = $(btn).data('csrf');
        const header = $(btn).data('csrf-header');

        if (!token) {
            location.href = '/member/login';
            return;
        }

        $.ajax({
            url: '/cart/add/' + bookId + '/ajax',
            type: 'POST',
            beforeSend: function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            data: { quantity: 1 },
            success: function() {
                const original = $(btn).text();
                $(btn).text('✔ 담김').prop('disabled', true);
                setTimeout(() => {
                    $(btn).text(original).prop('disabled', false);
                }, 1500);
            },
            error: function() {
                alert('장바구니 추가에 실패했습니다.');
            }
        });
    }
</script>

</body>
</html>
