<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>북마켓 - 도서목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 메뉴바 -->
<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/books}">📚 북마켓</a></div>
    <ul class="nav-menu">
        <li><a th:href="@{/books}" class="active">상품</a></li>
        <li sec:authorize="isAuthenticated()"><a th:href="@{/cart}">🛒 장바구니</a></li>
        <li sec:authorize="isAuthenticated()"><a th:href="@{/order}">주문내역</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">관리자</a></li>
    </ul>
    <div class="nav-user">
        <span sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
            <form th:action="@{/member/logout}" method="post" style="display:inline">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit"
            style="background:none; border:none; color:#aaa; cursor:pointer; font-size:inherit;">
        로그아웃
    </button>
</form>
        </span>
        <span sec:authorize="!isAuthenticated()">
            <a th:href="@{/member/login}">로그인</a>
            <a th:href="@{/member/register}">회원가입</a>
        </span>
    </div>
</nav>

<div class="container">
    <h2>도서 목록</h2>

    <!-- 검색 -->
    <form th:action="@{/books}" method="get" class="search-form">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="도서명 검색">
        <button type="submit">검색</button>
    </form>

    <!-- 도서 목록 테이블 (기존 Swing 테이블 구조 동일) -->
    <table class="book-table">
        <thead>
            <tr>
                <th>ISBN</th>
                <th>도서명</th>
                <th>가격</th>
                <th>저자</th>
                <th>카테고리</th>
                <th>출판일</th>
                <th>기능</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.isbn}"></td>
                <td>
                    <a th:href="@{/books/{id}(id=${book.bookId})}"
                       th:text="${book.title}"></a>
                </td>
                <td th:text="${#numbers.formatInteger(book.price, 0, 'COMMA') + '원'}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.category}"></td>
                <td th:text="${book.releaseDate}"></td><td>
                <form th:action="@{/cart/add/{id}(id=${book.bookId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-cart"
                            th:onclick="${#authorization.expression('isAuthenticated()')} ? null : 'location.href=\'/member/login\'; return false;'">
                        장바구니
                    </button>
                </form>
            </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(books)}" class="empty-msg">
        검색 결과가 없습니다.
    </div>
</div>

</body>
</html>
