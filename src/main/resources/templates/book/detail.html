<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${book.title} + ' - 북마켓'">도서 상세 - 북마켓</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    /* ── 상세 페이지 전용 스타일 ── */
    .detail-wrap {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      margin-top: 32px;
    }

    /* 표지 이미지 */
    .detail-cover {
      flex: 0 0 220px;
    }
    .detail-cover img {
      width: 220px;
      height: 300px;
      object-fit: cover;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-shadow: 2px 4px 12px rgba(0,0,0,.12);
    }
    .detail-cover .no-image {
      width: 220px;
      height: 300px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    /* 도서 정보 */
    .detail-info {
      flex: 1;
    }
    .detail-info .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    .detail-info h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px;
      line-height: 1.3;
    }
    .detail-info .author-line {
      color: #555;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .detail-info .price {
      font-size: 28px;
      font-weight: 700;
      color: #d32f2f;
      margin-bottom: 20px;
    }

    /* 메타 테이블 */
    .meta-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .meta-table th, .meta-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    .meta-table th {
      width: 90px;
      color: #888;
      font-weight: 500;
      background: #fafafa;
    }

    /* 재고 상태 */
    .stock-ok  { color: #2e7d32; font-weight: 600; }
    .stock-low { color: #e65100; font-weight: 600; }
    .stock-none{ color: #c62828; font-weight: 600; }

    /* 수량 선택 + 장바구니 */
    .add-to-cart-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .qty-control {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }
    .qty-control button {
      width: 34px;
      height: 38px;
      background: #f5f5f5;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: background .15s;
    }
    .qty-control button:hover { background: #e0e0e0; }
    .qty-control input {
      width: 48px;
      height: 38px;
      border: none;
      border-left: 1px solid #ccc;
      border-right: 1px solid #ccc;
      text-align: center;
      font-size: 15px;
    }
    .qty-control input::-webkit-inner-spin-button { display: none; }

    .btn-cart-detail {
      height: 38px;
      padding: 0 24px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-cart-detail:hover { background: #0d47a1; }
    .btn-cart-detail:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    /* 로그인 유도 메시지 */
    .login-notice {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }
    .login-notice a { color: #1565c0; }

    /* 설명 섹션 */
    .description-section {
      margin-top: 48px;
      border-top: 2px solid #1565c0;
      padding-top: 24px;
    }
    .description-section h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #222;
    }
    .description-section p {
      font-size: 14px;
      line-height: 1.8;
      color: #444;
      white-space: pre-line;
    }
    .description-section .no-desc {
      color: #aaa;
      font-style: italic;
    }

    /* 하단 버튼 */
    .back-btn {
      display: inline-block;
      margin-top: 36px;
      padding: 8px 20px;
      border: 1px solid #ccc;
      border-radius: 4px;
      color: #555;
      text-decoration: none;
      font-size: 14px;
      transition: background .15s;
    }
    .back-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>

<!-- ── 메뉴바 (list.html과 동일) ── -->
<nav class="navbar">
  <div class="nav-brand"><a th:href="@{/books}">📚 북마켓</a></div>
  <ul class="nav-menu">
    <li><a th:href="@{/books}">상품</a></li>
    <li sec:authorize="isAuthenticated()"><a th:href="@{/cart}">🛒 장바구니</a></li>
    <li sec:authorize="isAuthenticated()"><a th:href="@{/order}">주문내역</a></li>
    <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">관리자</a></li>
  </ul>
  <div class="nav-user">
        <span sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
            <form th:action="@{/member/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit"
                        style="background:none;border:none;color:#aaa;cursor:pointer;font-size:inherit;">
                    로그아웃
                </button>
            </form>
        </span>
    <span sec:authorize="!isAuthenticated()">
            <a th:href="@{/member/login}">로그인</a>
            <a th:href="@{/member/register}">회원가입</a>
        </span>
  </div>
</nav>

<!-- ── 본문 ── -->
<div class="container">

  <!-- 브레드크럼 -->
  <p style="font-size:13px; color:#999; margin-top:20px;">
    <a th:href="@{/books}" style="color:#999;">도서목록</a>
    &nbsp;›&nbsp;
    <span th:text="${book.category}" style="color:#999;"></span>
    &nbsp;›&nbsp;
    <span th:text="${book.title}"></span>
  </p>

  <!-- ── 상단: 표지 + 정보 ── -->
  <div class="detail-wrap">

    <!-- 표지 -->
    <div class="detail-cover">
      <img th:if="${book.coverImageUrl != null and !book.coverImageUrl.isEmpty()}"
           th:src="${book.coverImageUrl}"
           th:alt="${book.title}"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="no-image"
           th:style="${book.coverImageUrl == null or book.coverImageUrl.isEmpty()} ? '' : 'display:none'">
        📖
      </div>
    </div>

    <!-- 정보 영역 -->
    <div class="detail-info">

      <span class="badge" th:text="${book.category}">카테고리</span>

      <h1 th:text="${book.title}">도서명</h1>

      <p class="author-line">
        <span th:text="${book.author}">저자</span>
        <span th:if="${book.releaseDate != null and !book.releaseDate.isEmpty()}"
              th:text="' · ' + ${book.releaseDate}"></span>
      </p>

      <p class="price"
         th:text="${#numbers.formatInteger(book.price, 0, 'COMMA') + '원'}">0원</p>

      <!-- 메타 정보 -->
      <table class="meta-table">
        <tr>
          <th>ISBN</th>
          <td th:text="${book.isbn}">-</td>
        </tr>
        <tr>
          <th>저자</th>
          <td th:text="${book.author}">-</td>
        </tr>
        <tr>
          <th>출판일</th>
          <td th:text="${book.releaseDate != null and !book.releaseDate.isEmpty()} ? ${book.releaseDate} : '-'">-</td>
        </tr>
        <tr>
          <th>재고</th>
          <td>
            <span th:if="${book.stock > 10}"   class="stock-ok"  th:text="'재고 있음 (' + ${book.stock} + '권)'"></span>
            <span th:if="${book.stock > 0 and book.stock <= 10}" class="stock-low" th:text="'재고 부족 (' + ${book.stock} + '권 남음)'"></span>
            <span th:if="${book.stock == 0}"  class="stock-none">품절</span>
          </td>
        </tr>
      </table>

      <!-- 장바구니 담기 (로그인 상태) -->
      <div sec:authorize="isAuthenticated()">
        <form th:action="@{/cart/add/{id}(id=${book.bookId})}" method="post"
              th:if="${book.stock > 0}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="add-to-cart-box">
            <div class="qty-control">
              <button type="button" onclick="changeQty(-1)">−</button>
              <input type="number" id="qty" name="quantity" value="1" min="1"
                     th:max="${book.stock}">
              <button type="button" onclick="changeQty(1)">+</button>
            </div>
            <button type="submit" class="btn-cart-detail">🛒 장바구니 담기</button>
          </div>
        </form>
        <!-- 품절 -->
        <div th:if="${book.stock == 0}" class="add-to-cart-box">
          <button class="btn-cart-detail" disabled>품절</button>
        </div>
      </div>

      <!-- 비로그인 -->
      <div sec:authorize="!isAuthenticated()">
        <div class="add-to-cart-box">
          <button class="btn-cart-detail"
                  onclick="location.href='/member/login'">
            🛒 장바구니 담기
          </button>
        </div>
        <p class="login-notice">
          <a th:href="@{/member/login}">로그인</a> 후 구매하실 수 있습니다.
        </p>
      </div>

    </div><!-- /detail-info -->
  </div><!-- /detail-wrap -->

  <!-- ── 책 소개 ── -->
  <div class="description-section">
    <h3>책 소개</h3>
    <p th:if="${book.description != null and !book.description.isEmpty()}"
       th:text="${book.description}"></p>
    <p th:if="${book.description == null or book.description.isEmpty()}"
       class="no-desc">등록된 책 소개가 없습니다.</p>
  </div>

  <a th:href="@{/books}" class="back-btn">← 목록으로</a>

</div><!-- /container -->

<script>
  function changeQty(delta) {
    const input = document.getElementById('qty');
    const max   = parseInt(input.max) || 999;
    let val = parseInt(input.value) + delta;
    if (val < 1)   val = 1;
    if (val > max) val = max;
    input.value = val;
  }
</script>

</body>
</html>
