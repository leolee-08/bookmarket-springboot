<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>북마켓 - 관리자</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar('admin')}"></div>

<div class="container">
    <h2>🔧 관리자 페이지</h2>

    <div style="margin-bottom:20px;">
        <a th:href="@{/books/admin/new}" class="btn-primary">+ 도서 등록</a>
    </div>

    <table class="book-table">
        <thead>
        <tr>
            <th>ISBN</th>
            <th>도서명</th>
            <th>가격</th>
            <th>저자</th>
            <th>카테고리</th>
            <th>재고</th>
            <th>수정</th>
            <th>삭제</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${#numbers.formatInteger(book.price, 0, 'COMMA') + '원'}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.stock}"></td>
            <td>
                <a th:href="@{/books/admin/edit/{id}(id=${book.bookId})}"
                   class="btn-cart">수정</a>
            </td>
            <td>
                <form th:action="@{/books/admin/delete/{id}(id=${book.bookId})}"
                      method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-danger">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
