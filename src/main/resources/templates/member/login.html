<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>북마켓 - 로그인</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h2>📚 북마켓 로그인</h2>

        <!-- 에러 메시지 -->
        <div th:if="${errorMsg}" class="alert-error" th:text="${errorMsg}"></div>
        <!-- 회원가입 완료 메시지 -->
        <div th:if="${param.registered}" class="alert-success">
            회원가입이 완료되었습니다. 로그인해주세요.
        </div>

        <!-- 자체 로그인 -->
        <form th:action="@{/member/login}" method="post">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" name="username" placeholder="이메일 입력" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="btn-primary">로그인</button>
        </form>

        <div class="login-links">
            <a th:href="@{/member/register}">회원가입</a>
        </div>

        <div class="social-login">
            <p>소셜 로그인</p>
            <a th:href="@{/oauth2/authorization/google}" class="btn-google">Google 로그인</a>
            <a th:href="@{/oauth2/authorization/naver}" class="btn-naver">Naver 로그인</a>
        </div>
    </div>
</div>

</body>
</html>
