<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>북마켓 - 주문완료</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand"><a th:href="@{/books}">📚 북마켓</a></div>
  <ul class="nav-menu">
    <li><a th:href="@{/books}">상품</a></li>
    <li><a th:href="@{/cart}">🛒 장바구니</a></li>
    <li><a th:href="@{/order}" class="active">주문내역</a></li>
  </ul>
  <div class="nav-user">
    <span sec:authentication="name"></span>님
    <form th:action="@{/member/logout}" method="post" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit"
              style="background:none; border:none; color:#aaa; cursor:pointer;">
        로그아웃
      </button>
    </form>
  </div>
</nav>

<div class="container">
  <h2>✅ 주문완료</h2>

  <div class="order-card">
    <div class="order-header">
      <span>주문번호: <strong th:text="${order.orderId}"></strong></span>
      <span>주문일: <strong th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd')}"></strong></span>
      <span>상태: <strong th:text="${order.status}"></strong></span>
    </div>
    <div class="order-info">
      <p>배송지: <span th:text="${order.deliveryAddress}"></span></p>
    </div>

    <table class="book-table">
      <thead>
      <tr>
        <th>도서명</th>
        <th>수량</th>
        <th>단가</th>
        <th>합계</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="item : ${order.orderItems}">
        <td th:text="${item.book.title}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${#numbers.formatInteger(item.priceAtOrder, 0, 'COMMA') + '원'}"></td>
        <td th:text="${#numbers.formatInteger(item.totalPrice, 0, 'COMMA') + '원'}"></td>
      </tr>
      </tbody>
      <tfoot>
      <tr>
        <td colspan="3" style="text-align:right"><strong>총 금액:</strong></td>
        <td><strong th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + '원'}"></strong></td>
      </tr>
      </tfoot>
    </table>
  </div>

  <div style="margin-top:20px; display:flex; gap:10px;">
    <a th:href="@{/order}" class="btn-primary">주문내역 보기</a>
    <a th:href="@{/books}" class="btn-cart">계속 쇼핑하기</a>
  </div>
</div>

</body>
</html>
