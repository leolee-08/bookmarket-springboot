<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>북마켓 - 주문내역</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar('order')}"></div>

<div class="container">
    <h2>📋 주문내역</h2>

    <div th:if="${orders.isEmpty()}" class="empty-msg">
        주문 내역이 없습니다. <a th:href="@{/books}">도서 보러가기</a>
    </div>

    <!-- 주문 목록 (기존 CartOrderBillPage 구조 동일) -->
    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header">
            <span>주문번호: <strong th:text="${order.orderId}"></strong></span>
            <span>주문일: <strong th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd')}"></strong></span>
            <span>상태: <strong th:text="${order.status}"></strong></span>
        </div>
        <div class="order-info">
            <p>배송지: <span th:text="${order.deliveryAddress}"></span></p>
        </div>

        <!-- 주문 상세 (기존 Swing 장바구니 상품 목록과 동일) -->
        <table class="book-table">
            <thead>
                <tr>
                    <th>도서ID</th>
                    <th>수량</th>
                    <th>합계</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.orderItems}">
                    <td th:text="${item.book.isbn}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${#numbers.formatInteger(item.totalPrice, 0, 'COMMA') + '원'}"></td>
                </tr>
            </tbody>
        </table>
        <div class="order-total">
            총 금액: <strong th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + '원'}"></strong>
        </div>
    </div>
</div>

</body>
</html>
