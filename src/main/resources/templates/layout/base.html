<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북마켓 온라인 서점</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- 메뉴바 (기존 Swing 메뉴: 고객/상품/장바구니/주문) -->
<nav class="navbar">
    <div class="nav-brand">
        <a th:href="@{/books}">📚 북마켓</a>
    </div>
    <ul class="nav-menu">
        <li><a th:href="@{/books}">상품</a></li>
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/cart}">🛒 장바구니</a>
        </li>
        <li sec:authorize="isAuthenticated()">
            <a th:href="@{/order}">주문내역</a>
        </li>
        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin}">관리자</a>
        </li>
    </ul>
    <div class="nav-user">
        <span sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
            <form th:action="@{/member/logout}" method="post" style="display:inline">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit"
            style="background:none; border:none; color:#aaa; cursor:pointer; font-size:inherit;">
        로그아웃
    </button>
</form>
        </span>
        <span sec:authorize="!isAuthenticated()">
            <a th:href="@{/member/login}">로그인</a>
            <a th:href="@{/member/register}">회원가입</a>
        </span>
    </div>
</nav>

<!-- 본문 영역 -->
<div class="container" th:fragment="content">
    <!-- 각 페이지 내용이 여기 들어옴 -->
</div>

</body>
</html>
