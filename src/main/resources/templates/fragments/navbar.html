<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar" th:fragment="navbar(activeMenu)">
    <div class="nav-brand"><a th:href="@{/books}">📚 북마켓</a></div>
    <ul class="nav-menu">
        <li class="nav-item dropdown">
            <a th:href="@{/member/profile}"
               th:classappend="${activeMenu == 'customer'} ? 'active' : ''">고객</a>
            <ul class="dropdown-menu">
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/member/profile}">① 고객 정보 확인하기</a>
                </li>
                <li sec:authorize="!isAuthenticated()">
                    <a th:href="@{/member/login}">① 고객 정보 확인하기</a>
                </li>
            </ul>
        </li>
        <li class="nav-item dropdown">
            <a th:href="@{/books}"
               th:classappend="${activeMenu == 'books'} ? 'active' : ''">상품</a>
            <ul class="dropdown-menu">
                <li><a th:href="@{/books}">② 장바구니 상품목록 보기</a></li>
            </ul>
        </li>
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
            <a th:href="@{/cart}"
               th:classappend="${activeMenu == 'cart'} ? 'active' : ''">🛒 장바구니</a>
            <ul class="dropdown-menu">
                <li>
                    <form th:action="@{/cart/clear}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit">③ 비우기</button>
                    </form>
                </li>
                <li><a th:href="@{/books}">④ 항목 추가</a></li>
                <li><a th:href="@{/cart}">⑤ 항목수량 줄이기</a></li>
                <li><a th:href="@{/cart}">⑥ 항목 삭제하기</a></li>
            </ul>
        </li>
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
            <a th:href="@{/order}"
               th:classappend="${activeMenu == 'order' or activeMenu == 'admin'} ? 'active' : ''">주문</a>
            <ul class="dropdown-menu">
                <li><a th:href="@{/cart}">⑦ 주문하기</a></li>
                <li>
                    <form th:action="@{/member/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit">⑧ 종료</button>
                    </form>
                </li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin}">⑨ 관리자</a></li>
            </ul>
        </li>
    </ul>
    <div class="nav-user">
        <span sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>님
            <form th:action="@{/member/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-logout">로그아웃</button>
            </form>
        </span>
        <span sec:authorize="!isAuthenticated()">
            <a th:href="@{/member/login}">로그인</a>
            <a th:href="@{/member/register}">회원가입</a>
        </span>
    </div>
</nav>
</body>
</html>
